<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gerencial Avançado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container-fluid mt-4">
    <div class="card shadow mb-4">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Filtros de Análise</h4>
            <a href="/" class="btn btn-outline-light btn-sm">Voltar</a>
        </div>
        <div class="card-body">
            <form method="GET" action="/dashboard" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Compressor</label>
                    <select name="compressor" class="form-select">
                        <option value="">Todos os Equipamentos</option>
                        {% for i in range(1, 13) %}
                        {% set n = "%02d" % i %}
                        <option value="{{ n }}" {% if comp_selecionado == n %}selected{% endif %}>Compressor Nº {{ n }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">De:</label>
                    <input type="date" name="data_inicio" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Até:</label>
                    <input type="date" name="data_fim" class="form-control">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Atualizar Gráficos</button>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header bg-white fw-bold">Tendência Geral de Operação</div>
                <div class="card-body">
                    <canvas id="graficoGeral" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('graficoGeral').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels | tojson }},
            datasets: [
                { label: 'Temp. Óleo (°C)', data: {{ to | tojson }}, borderColor: 'blue', tension: 0.3 },
                { label: 'Temp. Descarga (°C)', data: {{ td | tojson }}, borderColor: 'red', tension: 0.3 },
                { label: 'Pressão Asp. (bar)', data: {{ pa | tojson }}, borderColor: 'green', tension: 0.3 },
                { label: 'Pressão Desc. (bar)', data: {{ pd | tojson }}, borderColor: 'orange', tension: 0.3 },
                { label: 'Capacidade (%)', data: {{ cap | tojson }}, borderColor: 'purple', tension: 0.3, borderDash: [5, 5] }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>
