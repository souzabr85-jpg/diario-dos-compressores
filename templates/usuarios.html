<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Gestão de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-4">
        <h2>Gerenciar Operadores</h2>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">Novo Usuário</div>
        <div class="card-body">
            <form method="POST" class="row g-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="col-md-4"><input type="text" name="nome" class="form-control" placeholder="Nome Completo" required></div>
                <div class="col-md-2"><input type="text" name="login" class="form-control" placeholder="Login" required></div>
                <div class="col-md-2"><input type="password" name="senha" class="form-control" placeholder="Senha" required></div>
                <div class="col-md-2">
                    <select name="perfil" class="form-select">
                        <option value="Operador">Operador</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Cadastrar</button></div>
            </form>
        </div>
    </div>

    <table class="table table-white table-striped shadow-sm">
        <thead><tr><th>Nome</th><th>Login</th><th>Perfil</th><th>Ações</th></tr></thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u[1] }}</td><td>{{ u[2] }}</td><td>{{ u[3] }}</td>
                <td>{% if u[2] != 'admin' %}
                    <form method="POST" action="/excluir_usuario/{{ u[0] }}" style="display:inline;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Tem certeza que deseja excluir este usuário?')">Excluir</button>
                    </form>
                {% endif %}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
