<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diário dos Compressores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">Sala de Máquinas</h3>
        <p class="text-muted">Acesso Restrito ao Sistema</p>
    </div>

    {% if erro %}
    <div class="alert alert-danger text-center p-2" role="alert">
        {{ erro }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
            <label class="form-label fw-bold">Usuário</label>
            <input type="text" class="form-control" name="usuario" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">Senha</label>
            <input type="password" class="form-control" name="senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold btn-lg">Entrar no Sistema</button>
    </form>
</div>

</body>
</html>
